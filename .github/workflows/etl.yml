# 시장 데이터 ETL 스케줄러
# Vercel 크론이 플랜 제약으로 실행되지 않아 GitHub Actions 스케줄로 이관.
# 각 잡은 프로덕션 크론 엔드포인트를 CRON_SECRET 으로 호출한다.
# (엔드포인트는 x-vercel-cron 헤더 또는 x-cron-secret 일치 시 허용)
name: Market ETL

on:
  schedule:
    # 하루 2회 — 09:00 KST(00:00 UTC), 18:00 KST(09:00 UTC)
    - cron: "0 0 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  etl:
    runs-on: ubuntu-latest
    steps:
      - name: Run daily ingests
        env:
          CRS: ${{ secrets.CRON_SECRET }}
        run: |
          set -o pipefail
          FAILED=""
          call() {
            NAME="$1"; URL="$2"
            echo "== $NAME =="
            BODY=$(curl -sS --max-time 290 -H "x-cron-secret: $CRS" "$URL" || echo '{"error":"curl failed"}')
            echo "$BODY" | head -c 1000; echo
            echo "$BODY" | grep -qi '"error"\|"ok":false' && FAILED="$FAILED $NAME" || true
          }
          call reb "https://nuguzip.com/api/cron/reb-ingest"
          call kb "https://nuguzip.com/api/cron/kb-ingest"
          # kosis: KOSIS 키 활성화 전까지 skipped 응답 — 실패로 집계하지 않음(소프트)
          echo "== kosis (soft) =="
          curl -sS --max-time 290 -H "x-cron-secret: $CRS" "https://nuguzip.com/api/cron/kosis-ingest" | head -c 500 || true
          echo
          # ecos: ECOS 키 활성화 전까지 skipped 응답 — 소프트
          echo "== ecos (soft) =="
          curl -sS --max-time 60 -H "x-cron-secret: $CRS" "https://nuguzip.com/api/cron/ecos-sync" | head -c 500 || true
          echo
          # onbid: 서울 공매 물건 — 키 없으면 skipped (소프트)
          echo "== onbid (soft) =="
          curl -sS --max-time 120 -H "x-cron-secret: $CRS" "https://nuguzip.com/api/cron/onbid-sync" | head -c 500 || true
          echo
          call complex-crawl "https://nuguzip.com/api/cron/complex-crawl"
          call attendance "https://nuguzip.com/api/cron/attendance-reminders"
          # molit 전국 실거래: 매월 1일에만
          if [ "$(date -u +%d)" = "01" ]; then
            call molit "https://nuguzip.com/api/cron/molit-transactions-ingest"
          fi
          if [ -n "$FAILED" ]; then
            echo "failed:$FAILED" | tee etl-failed.txt
            exit 1
          fi
      - name: Report ETL failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DETAIL=$(cat etl-failed.txt 2>/dev/null || echo "unknown")
          gh api repos/${{ github.repository }}/issues -f title="Market ETL failure $(date -u +%FT%TZ)" -f body="run: ${{ github.run_id }} — $DETAIL" || true
