# Vercel 자동 배포
# - main 브랜치 푸시 → 프로덕션 (nuguzip.com)
# - 그 외 브랜치 푸시 → 프리뷰 URL
# 필요 시크릿: VERCEL_TOKEN (저장소 Settings → Secrets → Actions)
name: Deploy to Vercel

on:
  push:
    # main = 프로덕션. 스테이징 미러(design-revamp)는 main과 동일 커밋이라
    # 중복 배포·실패 이슈 노이즈만 생겨 제외 — 프리뷰가 필요한 브랜치만 추가.
    branches: ["main"]

env:
  VERCEL_ORG_ID: team_HEspqLpVXaHn1GHTEjqbSZ2E
  VERCEL_PROJECT_ID: prj_hsE8uEG7QyxefafQpVnKx6diCVqO
  SRK: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  CRS: ${{ secrets.CRON_SECRET }}
  CODEF_ID: ${{ secrets.CODEF_CLIENT_ID }}
  CODEF_SECRET: ${{ secrets.CODEF_CLIENT_SECRET }}
  CODEF_PUB: ${{ secrets.CODEF_PUBLIC_KEY }}
  ECOS_KEY: ${{ secrets.ECOS_API_KEY }}
  ONBID_KEY: ${{ secrets.ONBID_SERVICE_KEY }}

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks 이력 스캔을 위해 전체 히스토리 필요
          fetch-depth: 0
      # ---- 시크릿 스캔 (#94): 유출 감지 시 빌드 중단 ----
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # ---- 품질 게이트 (#27): 링크 무결성 검사 ----
      # vercel build 산출물(.vercel/output)로는 next start가 불가하므로
      # 검사용 next build를 1회 별도 수행 (빌드 2회 허용 — 안정성 우선)
      - name: Install dependencies
        run: npm ci
      - name: Build for link check
        shell: bash
        run: |
          set -o pipefail
          npx next build 2>&1 | tee build.log
      # ---- 번들 예산 (#4): 라우트별 First Load JS 250kB 초과 경고 (실패시키지 않음) ----
      - name: Bundle budget check (First Load JS <= 250kB, warn only)
        run: |
          if [ ! -f build.log ]; then
            echo "build.log not found — skipping bundle budget check"
            exit 0
          fi
          # next build 라우트 표에서 "<tree> <symbol> /route ... <size> <unit> <firstLoad> <unit>" 행 파싱
          awk '
            $3 ~ /^\// && NF >= 5 && $NF ~ /^(B|kB|MB)$/ {
              unit = $NF; val = $(NF-1) + 0;
              if (unit == "MB") kb = val * 1024;
              else if (unit == "kB") kb = val;
              else kb = val / 1024;
              if (kb > 250) {
                over++;
                printf "::warning title=Bundle budget::First Load JS %s %s exceeds 250 kB budget: %s\n", $(NF-1), unit, $3;
              }
            }
            END {
              if (over) printf "%d route(s) over the 250 kB First Load JS budget (warning only)\n", over;
              else print "All routes within the 250 kB First Load JS budget";
            }
          ' build.log
      - name: Link integrity check
        run: |
          npx next start -p 3100 &
          SERVER_PID=$!
          # 서버 기동 대기 (최대 60초)
          for i in $(seq 1 60); do
            if curl -sfo /dev/null http://localhost:3100/; then break; fi
            sleep 1
          done
          PORT=3100 node scripts/check-links.mjs
          STATUS=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $STATUS
      # ---- 기존 Vercel 배포 단계 (그대로 유지) ----
      # 공개 Supabase 값 정정 — 프로젝트 env에 "[SENSITIVE]" 플레이스홀더가
      # 저장돼 있던 문제 수정 (URL·publishable 키는 공개 정보, RLS로 보호)
      - name: Sync public Supabase env
        run: |
          for ENVTARGET in production preview; do
            npx vercel env rm NEXT_PUBLIC_SUPABASE_URL $ENVTARGET --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
            printf 'https://pbhiskvwpwwhtkmnhkbm.supabase.co' | npx vercel env add NEXT_PUBLIC_SUPABASE_URL $ENVTARGET --token=${{ secrets.VERCEL_TOKEN }} || true
            npx vercel env rm NEXT_PUBLIC_SUPABASE_ANON_KEY $ENVTARGET --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
            printf 'sb_publishable_UjkQXcYY6f9oBbjjfZvFAA_jYpui-OX' | npx vercel env add NEXT_PUBLIC_SUPABASE_ANON_KEY $ENVTARGET --token=${{ secrets.VERCEL_TOKEN }} || true
          done
      # Service Role 키 동기화 — GitHub Secret(SUPABASE_SERVICE_ROLE_KEY)이
      # 설정돼 있을 때만 Vercel env의 마스킹 값("[SENSITIVE]")을 실값으로 교체
      - name: Sync service role env
        if: ${{ env.SRK != '' }}
        run: |
          npx vercel env rm SUPABASE_SERVICE_ROLE_KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          printf '%s' "$SRK" | npx vercel env add SUPABASE_SERVICE_ROLE_KEY production --token=${{ secrets.VERCEL_TOKEN }} || true
      # CRON_SECRET 동기화 — ETL 스케줄러(etl.yml)가 같은 값으로 크론 엔드포인트 호출
      - name: Sync cron secret env
        if: ${{ env.CRS != '' }}
        run: |
          npx vercel env rm CRON_SECRET production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          printf '%s' "$CRS" | npx vercel env add CRON_SECRET production --token=${{ secrets.VERCEL_TOKEN }} || true
      # CODEF 자격 증명 동기화 — GitHub Secret 설정 시에만 Vercel env로 반영
      # (KB 시세·공시가격 등 CODEF 연동 활성화. 미설정이면 스킵)
      - name: Sync CODEF credentials
        if: ${{ env.CODEF_ID != '' }}
        run: |
          for KEY in CODEF_CLIENT_ID CODEF_CLIENT_SECRET CODEF_PUBLIC_KEY; do
            npx vercel env rm $KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          done
          printf '%s' "$CODEF_ID"     | npx vercel env add CODEF_CLIENT_ID production --token=${{ secrets.VERCEL_TOKEN }} || true
          printf '%s' "$CODEF_SECRET" | npx vercel env add CODEF_CLIENT_SECRET production --token=${{ secrets.VERCEL_TOKEN }} || true
          printf '%s' "$CODEF_PUB"    | npx vercel env add CODEF_PUBLIC_KEY production --token=${{ secrets.VERCEL_TOKEN }} || true
      # ECOS(한국은행) 인증키 동기화 — 설정 시 기준금리 등 지표 자동 연동
      - name: Sync ECOS key
        if: ${{ env.ECOS_KEY != '' }}
        run: |
          npx vercel env rm ECOS_API_KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          printf '%s' "$ECOS_KEY" | npx vercel env add ECOS_API_KEY production --token=${{ secrets.VERCEL_TOKEN }} || true
      # 온비드(공공데이터포털) 인증키 동기화 — 서울 공매 물건 연동
      - name: Sync ONBID key
        if: ${{ env.ONBID_KEY != '' }}
        run: |
          npx vercel env rm ONBID_SERVICE_KEY production --yes --token=${{ secrets.VERCEL_TOKEN }} 2>/dev/null || true
          printf '%s' "$ONBID_KEY" | npx vercel env add ONBID_SERVICE_KEY production --token=${{ secrets.VERCEL_TOKEN }} || true
      - name: Pull Vercel environment
        run: npx vercel pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: npx vercel build ${{ github.ref_name == 'main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        shell: bash
        run: |
          set -o pipefail
          # --archive=tgz: 무료 플랜 24h 업로드 파일 수(5000) 한도 대응 — 아카이브 1개로 업로드
          npx vercel deploy --prebuilt --archive=tgz ${{ github.ref_name == 'main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tee deploy.log
      - name: Report deploy failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAIL=$(tail -c 3000 deploy.log 2>/dev/null || echo "no log")
          gh api repos/${{ github.repository }}/issues -f title="Deploy failure $(date -u +%FT%TZ)" -f body="run: ${{ github.run_id }}
          \`\`\`
          $TAIL
          \`\`\`" || true
